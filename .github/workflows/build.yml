name: Spring Boot CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build & Test
        run: mvn clean verify

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: springboot-jar
          path: target/*.jar

      - name: Build Docker Image
        run: |
          docker build \
            -t myapp:${{ github.sha }} \
            -t myapp:latest \
            .

      - name: Verify Docker Image
        run: docker images